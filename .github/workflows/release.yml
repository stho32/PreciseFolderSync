name: release

permissions:
  contents: write

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

env:
  DOTNET_VERSION: "10.0.x"
  SOLUTION_DIR: "Pfs"
  PROJECT: "./Pfs/Pfs.csproj"

jobs:
  prepare:
    name: Prepare version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Calculate next version
        id: version
        run: |
          # Find latest semver tag
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1)

          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v1.14.0"
            echo "No semver tag found, starting from $LATEST_TAG"
          fi

          echo "Latest tag: $LATEST_TAG"

          # Parse version components
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Determine bump type
          BUMP="${{ github.event.inputs.bump || 'patch' }}"
          echo "Bump type: $BUMP"

          case $BUMP in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"

          echo "New version: $NEW_VERSION"
          echo "New tag: $NEW_TAG"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

  build-and-release:
    name: Build and Release
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        include:
          - os: windows-latest
            RUNTIMEID: win-x64
            OUTPUTDIR: pfs-win-x64
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install dependencies
        run: dotnet restore
        working-directory: Source/${{ env.SOLUTION_DIR }}

      - name: Build
        run: dotnet build --configuration Release --no-restore /p:Version=${{ needs.prepare.outputs.version }}
        working-directory: Source/${{ env.SOLUTION_DIR }}

      - name: Test
        run: dotnet test --configuration Release --no-restore
        working-directory: Source/${{ env.SOLUTION_DIR }}

      - name: Publish
        run: dotnet publish ${{ env.PROJECT }} -c Release -o ${{ matrix.OUTPUTDIR }} -r ${{ matrix.RUNTIMEID }} --self-contained true /p:Version=${{ needs.prepare.outputs.version }}
        working-directory: Source/${{ env.SOLUTION_DIR }}

      - name: Remove PDB files
        run: |
          Get-ChildItem -Path ${{ matrix.OUTPUTDIR }} -Filter *.pdb -Recurse | Remove-Item -Force
        shell: pwsh
        working-directory: Source/${{ env.SOLUTION_DIR }}

      - uses: vimtor/action-zip@v1
        with:
          files: ./Source/${{ env.SOLUTION_DIR }}/${{ matrix.OUTPUTDIR }}/
          dest: ${{ matrix.OUTPUTDIR }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: "PreciseFolderSync ${{ needs.prepare.outputs.tag }}"
          generate_release_notes: true
          files: |
            ${{ matrix.OUTPUTDIR }}.zip
